version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "8000:8000"
    environment:
      - ENABLE_NER=false
      - OCR_ENGINE=tesseract
    volumes:
      - ./backend:/app
      # Cache for uv
      - uv-cache:/root/.cache/uv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  uv-cache:
